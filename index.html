<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quiz Interativo – Evolução de Produtos Digitais</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:#1e293b;
padding:40px;
border-radius:12px;
width:720px;
box-shadow:0 0 25px rgba(0,0,0,0.4);
}

.option{
background:#334155;
padding:12px;
border-radius:8px;
margin:10px 0;
cursor:pointer;
}

.option:hover{
background:#475569;
}

.correct{
background:#22c55e;
}

.wrong{
background:#ef4444;
}

button{
background:#38bdf8;
border:none;
padding:10px 20px;
border-radius:8px;
margin-top:20px;
cursor:pointer;
}

.feedback{
margin-top:20px;
padding:15px;
background:#020617;
border-radius:8px;
}

.progress{
height:10px;
background:#334155;
border-radius:10px;
margin-bottom:20px;
}

.bar{
height:10px;
background:#38bdf8;
width:0%;
border-radius:10px;
transition:0.3s;
}

</style>

</head>

<body>

<div class="container">

<div class="progress">
<div class="bar" id="progressBar"></div>
</div>

<h2 id="questionTitle"></h2>

<div id="question"></div>

<div id="options"></div>

<div id="feedback" class="feedback"></div>

<button id="nextBtn" onclick="nextQuestion()" style="display:none;">Próxima pergunta</button>

</div>

<script>

let questions = [

{
q:"O que representa o lançamento de um MVP em produtos digitais?",
options:[
"O início do processo de aprendizado e melhoria do produto",
"A versão final do produto",
"O encerramento do desenvolvimento",
"A etapa em que não são necessárias mudanças"
],
correct:0,
explanation:"O MVP marca o início do processo de aprendizado, permitindo melhorar o produto com base no uso real dos usuários."
},

{
q:"No ciclo Construir – Medir – Aprender, o que ocorre na etapa 'Medir'?",
options:[
"Implementar novas funcionalidades",
"Analisar dados e métricas de uso do produto",
"Encerrar o desenvolvimento",
"Criar novas tecnologias"
],
correct:1,
explanation:"Na etapa Medir são analisados dados e métricas para entender como os usuários interagem com o produto."
},

{
q:"Para que serve o framework RICE?",
options:[
"Criar novas tecnologias",
"Priorizar melhorias com base em alcance, impacto, confiança e esforço",
"Substituir testes com usuários",
"Eliminar funcionalidades do sistema"
],
correct:1,
explanation:"O framework RICE ajuda a comparar melhorias considerando alcance, impacto, confiança e esforço."
},

{
q:"Qual situação representa uma otimização de produto?",
options:[
"Criar muitas novas funcionalidades",
"Melhorar a usabilidade de uma funcionalidade existente",
"Encerrar o produto após o lançamento",
"Remover todos os dados de uso"
],
correct:1,
explanation:"Otimizações melhoram funcionalidades existentes para tornar o produto mais eficiente e fácil de usar."
}

];

let current = 0;
let score = 0;
let answered = false;

function loadQuestion(){

answered=false;

let q = questions[current];

document.getElementById("questionTitle").innerText="Pergunta "+(current+1);

document.getElementById("question").innerText=q.q;

document.getElementById("feedback").innerHTML="";

document.getElementById("nextBtn").style.display="none";

let optionsHTML="";

q.options.forEach((opt,i)=>{

optionsHTML += `<div class="option" onclick="checkAnswer(${i}, this)">${opt}</div>`;

});

document.getElementById("options").innerHTML=optionsHTML;

document.getElementById("progressBar").style.width=((current)/questions.length*100)+"%";

}

function checkAnswer(i, element){

if(answered) return;

answered=true;

let q = questions[current];

let feedback=document.getElementById("feedback");

if(i===q.correct){

element.classList.add("correct");

score++;

feedback.innerHTML="✅ <b>Resposta correta.</b><br><br>"+q.explanation;

}else{

element.classList.add("wrong");

document.getElementsByClassName("option")[q.correct].classList.add("correct");

feedback.innerHTML="❌ <b>Resposta incorreta.</b><br><br>"+q.explanation;

}

document.getElementById("nextBtn").style.display="block";

}

function nextQuestion(){

current++;

if(current < questions.length){

loadQuestion();

}else{

showResult();

}

}

function showResult(){

document.querySelector(".container").innerHTML = `
<h1>Resultado Final</h1>

<p>Você acertou <b>${score}</b> de ${questions.length} perguntas.</p>

<p>Produtos digitais evoluem continuamente por meio de iteração, análise de dados e priorização de melhorias.</p>

<button onclick="location.reload()">Refazer atividade</button>
`;

}

loadQuestion();

</script>

</body>
</html>
