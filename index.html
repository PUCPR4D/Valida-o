<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quiz Interativo – Evolução de Produtos Digitais</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:#1e293b;
padding:40px;
border-radius:12px;
width:720px;
box-shadow:0 0 30px rgba(0,0,0,0.4);
}

h1{
margin-top:0;
}

.option{
background:#334155;
padding:12px;
border-radius:8px;
margin:10px 0;
cursor:pointer;
}

.option:hover{
background:#475569;
}

button{
background:#38bdf8;
border:none;
padding:10px 20px;
border-radius:8px;
margin-top:20px;
cursor:pointer;
}

.progress{
height:10px;
background:#334155;
border-radius:10px;
margin-bottom:20px;
}

.bar{
height:10px;
background:#38bdf8;
width:25%;
border-radius:10px;
transition:0.3s;
}

.feedback{
margin-top:20px;
padding:10px;
background:#020617;
border-radius:8px;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="container">

<div class="progress">
<div class="bar" id="progress"></div>
</div>

<h1 id="questionTitle">Pergunta 1</h1>

<div id="question"></div>

<div id="options"></div>

<div id="feedback" class="feedback hidden"></div>

<button id="nextBtn" class="hidden" onclick="nextQuestion()">Próxima</button>

</div>

<script>

let questions = [

{
q:"Em produtos digitais, o lançamento de um MVP representa:",
options:[
"O início do processo de aprendizado e melhoria do produto",
"A versão final e definitiva do produto",
"A fase em que não são necessárias mudanças",
"O encerramento do desenvolvimento"
],
correct:0,
explanation:"Correto! O MVP marca o início do processo de aprendizado, permitindo melhorar o produto com base no uso real."
},

{
q:"No ciclo Construir – Medir – Aprender, o que acontece na etapa 'Medir'?",
options:[
"Implementar novas funcionalidades",
"Analisar dados e métricas de uso do produto",
"Encerrar o desenvolvimento do sistema",
"Adicionar mais tecnologia ao produto"
],
correct:1,
explanation:"Correto! A etapa 'Medir' analisa dados de uso para entender como os usuários interagem com o sistema."
},

{
q:"Qual é o objetivo principal do framework RICE?",
options:[
"Criar novas tecnologias para o produto",
"Priorizar melhorias com base em impacto e esforço",
"Substituir o feedback dos usuários",
"Eliminar todas as funcionalidades do sistema"
],
correct:1,
explanation:"Correto! O framework RICE ajuda a priorizar melhorias considerando alcance, impacto, confiança e esforço."
},

{
q:"Qual das alternativas representa um exemplo de otimização de produto?",
options:[
"Criar uma nova funcionalidade complexa",
"Melhorar a usabilidade de uma funcionalidade existente",
"Encerrar o produto após o lançamento",
"Remover todas as métricas de uso"
],
correct:1,
explanation:"Correto! Otimizações melhoram funcionalidades existentes para tornar o produto mais eficiente e fácil de usar."
}

];

let current = 0;
let score = 0;

function loadQuestion(){

let q = questions[current];

document.getElementById("questionTitle").innerText="Pergunta "+(current+1);

document.getElementById("question").innerText=q.q;

let optionsHTML="";

q.options.forEach((opt,i)=>{

optionsHTML+=`<div class="option" onclick="checkAnswer(${i})">${opt}</div>`

});

document.getElementById("options").innerHTML=optionsHTML;

document.getElementById("feedback").classList.add("hidden");

document.getElementById("nextBtn").classList.add("hidden");

document.getElementById("progress").style.width=((current+1)/questions.length*100)+"%";

}

function checkAnswer(i){

let q = questions[current];

let feedback=document.getElementById("feedback");

feedback.classList.remove("hidden");

if(i===q.correct){

score++;

feedback.innerHTML="✅ Resposta correta!<br><br>"+q.explanation;

}else{

feedback.innerHTML="❌ Resposta incorreta.<br><br>"+q.explanation;

}

document.getElementById("nextBtn").classList.remove("hidden");

}

function nextQuestion(){

current++;

if(current<questions.length){

loadQuestion();

}else{

showResult();

}

}

function showResult(){

document.querySelector(".container").innerHTML=`

<h1>Resultado Final</h1>

<p>Você acertou <b>${score}</b> de ${questions.length} perguntas.</p>

<p>Produtos digitais evoluem continuamente por meio de iteração, análise de dados e priorização de melhorias.</p>

<button onclick="location.reload()">Refazer atividade</button>

`;

}

loadQuestion();

</script>

</body>
</html>
